name: Keep warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the API so Render's free instance never idles out
        run: curl --fail --silent --show-error --max-time 90 https://compliance-api-dt6t.onrender.com/health
